name: Release

on:
  workflow_dispatch:
    inputs:
      deploy_docs:
        description: 'Deploy the documentation site'
        required: true
        default: true
        type: boolean
      publish_packages:
        description: 'Create or publish npm releases for react-actions-chat and companion packages'
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  validate-inputs:
    name: Validate Release Inputs
    runs-on: ubuntu-latest

    steps:
      - name: Ensure workflow runs on the default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$REF_NAME" != "$DEFAULT_BRANCH" ]; then
            echo "Release automation must run from $DEFAULT_BRANCH, got $REF_NAME."
            exit 1
          fi

      - name: Ensure at least one target is selected
        env:
          DEPLOY_DOCS: ${{ inputs.deploy_docs }}
          PUBLISH_PACKAGES: ${{ inputs.publish_packages }}
        run: |
          if [ "$DEPLOY_DOCS" != "true" ] && [ "$PUBLISH_PACKAGES" != "true" ]; then
            echo 'Select at least one release target.'
            exit 1
          fi

  deploy-docs:
    name: Deploy Docs
    needs: validate-inputs
    if: ${{ inputs.deploy_docs }}
    uses: ./.github/workflows/deploy-docs.yml
    secrets: inherit

  release-packages:
    name: Release npm Packages
    needs: validate-inputs
    if: ${{ inputs.publish_packages }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    env:
      PUBLISHABLE_PACKAGES: |-
        react-actions-chat
        react-actions-chat-llms
        react-actions-chat-recommended-actions
        react-actions-chat-support

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup npm for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: List publishable packages
        run: |
          {
            echo '### Publishable npm packages'
            echo
            while IFS= read -r package_name; do
              echo "- \`${package_name}\`"
            done <<< "$PUBLISHABLE_PACKAGES"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create Release Pull Request or Publish Workspace Packages to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: 'chore: release package'
          title: 'chore: release package'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
